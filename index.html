<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro Sincronizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans text-slate-800">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden min-h-[600px]">
        <header class="bg-blue-600 p-6 text-white flex justify-between items-center shadow-lg">
            <div>
                <h1 class="text-xl font-bold">Meu Financeiro Cloud</h1>
                <p id="status" class="text-blue-100 text-xs italic font-semibold">Iniciando...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="aba('lancamentos')" class="text-sm bg-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-800 transition">Início</button>
                <button onclick="aba('categorias')" class="text-sm bg-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-800 transition">Categorias</button>
                <button onclick="document.getElementById('importFile').click()" class="text-sm bg-green-500 px-3 py-1.5 rounded-lg hover:bg-green-600 transition font-bold text-white">Importar JSON</button>
                <input type="file" id="importFile" class="hidden" onchange="importarDados(event)">
            </div>
        </header>

        <main id="conteudo-lancamentos" class="p-6">
            <div id="corpoTabela" class="space-y-4">
                <div class="text-center py-10">
                    <p class="text-slate-400">Pronto! Clique em "Importar JSON" para subir o arquivo "meus_dados.json".</p>
                </div>
            </div>
        </main>

        <main id="conteudo-categorias" class="p-6 hidden">
            <h2 class="text-lg font-bold mb-4 text-blue-600">Categorias</h2>
            <div class="flex gap-2 mb-6">
                <input type="text" id="novaCat" class="border p-2 flex-1 rounded-lg outline-none" placeholder="Nova Categoria">
                <button onclick="addCat()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">Add</button>
            </div>
            <ul id="listaCat" class="divide-y border rounded-lg bg-slate-50"></ul>
        </main>
    </div>

    <script>
        // CONFIGURAÇÃO AUTOMATIZADA
        const TOKEN = "vercel_blob_rw_LSTMZDJfvY9YzSu8_yaCRUQbcCBJKGW4MMuLYCuKhUJ2knI"; 
        const targetUrl = "https://blob.vercel-storage.com/meu_financeiro.json";

        let dados = { categorias: ["Moradia", "Alimentação", "Lazer", "Veículo", "Saúde"], transacoes: [] };

        function aba(n) {
            document.getElementById('conteudo-lancamentos').classList.toggle('hidden', n !== 'lancamentos');
            document.getElementById('conteudo-categorias').classList.toggle('hidden', n !== 'categorias');
            if(n === 'categorias') renderCat();
        }

        async function salvar() {
    const statusEl = document.getElementById('status');
    statusEl.innerText = "Sincronizando...";
    
    try {
        // Mudamos para o endereço de upload direto da API do Blob
        const res = await fetch(`https://blob.vercel-storage.com/meu_financeiro.json`, {
            method: 'PUT',
            body: JSON.stringify(dados),
            headers: { 
                'Authorization': `Bearer ${TOKEN}`,
                'x-api-version': '1',
                'Content-Type': 'application/json'
            }
        });

        if (res.ok) {
            statusEl.innerText = "Sincronizado com Sucesso!";
            render();
        } else {
            const erroTxt = await res.text();
            statusEl.innerText = "Erro: Sem permissão no Storage.";
            console.error("Detalhe do erro:", erroTxt);
        }
    } catch (err) {
        statusEl.innerText = "Erro de conexão com a Vercel.";
        console.error(err);
    }
}
            
            try {
                const res = await fetch(targetUrl, {
                    method: 'PUT',
                    body: JSON.stringify(dados),
                    headers: { 
                        'Authorization': `Bearer ${TOKEN}`, 
                        'x-cp-content-type': 'application/json' 
                    }
                });

                if (res.ok) {
                    statusEl.innerText = "Sincronizado com Sucesso!";
                    render();
                } else {
                    statusEl.innerText = "Erro na permissão da nuvem.";
                }
            } catch (err) {
                statusEl.innerText = "Erro de conexão.";
                console.error(err);
            }
        }

        function importarDados(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    dados = JSON.parse(ev.target.result);
                    salvar();
                } catch (err) {
                    alert("Arquivo inválido.");
                }
            };
            reader.readAsText(e.target.files[0]);
        }

        function render() {
            const c = document.getElementById('corpoTabela');
            if (dados.transacoes.length === 0) return;
            c.innerHTML = dados.transacoes.map((t, i) => `
                <div class="border border-slate-200 rounded-xl p-4 bg-white shadow-sm hover:shadow-md cursor-pointer" onclick="toggle(${i})">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <h3 class="font-bold text-slate-800">${t.subitens && t.subitens.length > 0 ? (t.aberto ? '▼ ' : '▶ ') : ''}${t.desc}</h3>
                            <div class="flex gap-2 mt-1">
                                <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded font-bold uppercase">${t.categoria}</span>
                                <span class="text-[10px] text-slate-400 font-semibold">${t.data}</span>
                            </div>
                        </div>
                        <div class="text-right font-mono font-bold text-lg ${t.valor < 0 ? 'text-red-500' : 'text-green-600'}">
                            R$ ${Math.abs(t.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})}
                        </div>
                    </div>
                    ${t.aberto && t.subitens ? `<div class="mt-4 pt-3 border-t border-dashed space-y-2">
                        ${t.subitens.map(s => `<div class="flex justify-between text-sm italic text-slate-500 font-medium">
                            <span>${s.desc}</span><span>R$ ${s.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                        </div>`).join('')}
                    </div>` : ''}
                </div>
            `).join('');
        }

        function toggle(i) {
            if(dados.transacoes[i].subitens) {
                dados.transacoes[i].aberto = !dados.transacoes[i].aberto;
                render();
            }
        }

        function renderCat() {
            document.getElementById('listaCat').innerHTML = dados.categorias.map(cat => `
                <li class="p-3 flex justify-between items-center bg-white"><span>${cat}</span></li>
            `).join('');
        }

        // Tenta carregar ao abrir
        window.onload = () => {
            fetch(targetUrl + '?t=' + Date.now(), { headers: { 'Authorization': `Bearer ${TOKEN}` } })
                .then(r => r.json())
                .then(d => {
                    dados = d;
                    document.getElementById('status').innerText = "Conectado";
                    render();
                })
                .catch(() => { document.getElementById('status').innerText = "Pronto para iniciar"; });
        };
    </script>
</body>
</html>
