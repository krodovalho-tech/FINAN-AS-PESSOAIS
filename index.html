<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Automático</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <header class="bg-blue-600 p-6 text-white flex justify-between items-center">
            <h1 class="text-xl font-bold">Meu Financeiro Cloud</h1>
            <div class="flex gap-2">
                <button onclick="aba('lancamentos')" class="text-sm bg-blue-700 px-3 py-1 rounded">Início</button>
                <button onclick="aba('categorias')" class="text-sm bg-blue-700 px-3 py-1 rounded">Categorias</button>
                <button onclick="document.getElementById('importFile').click()" class="text-sm bg-green-500 px-3 py-1 rounded">Importar JSON</button>
                <input type="file" id="importFile" class="hidden" onchange="importarDados(event)">
            </div>
        </header>

        <div id="status" class="bg-yellow-100 text-yellow-800 text-center text-xs p-1">Pronto para iniciar</div>

        <main id="conteudo-lancamentos" class="p-6">
            <div id="corpoTabela" class="space-y-4"></div>
        </main>

        <main id="conteudo-categorias" class="p-6 hidden">
            <div class="flex gap-2 mb-4">
                <input type="text" id="novaCat" class="border p-2 flex-1 rounded" placeholder="Nova Categoria">
                <button onclick="addCat()" class="bg-blue-600 text-white px-4 rounded">Add</button>
            </div>
            <ul id="listaCat" class="divide-y"></ul>
        </main>
    </div>

    <script>
        const TOKEN = "vercel_blob_rw_LSTMZDJfvY9YzSu8_yaCRUQbcCBJKGW4MMuLYCuKhUJ2knI";
        let BL_URL = localStorage.getItem('url_ativa') || "";
        let dados = { categorias: [], transacoes: [] };

        function aba(n) {
            document.getElementById('conteudo-lancamentos').classList.toggle('hidden', n !== 'lancamentos');
            document.getElementById('conteudo-categorias').classList.toggle('hidden', n !== 'categorias');
            if(n==='categorias') renderCat();
        }

        async function salvar() {
            document.getElementById('status').innerText = "Salvando na nuvem...";
            const res = await fetch(BL_URL || `https://blob.vercel-storage.com/dados.json`, {
                method: 'PUT',
                body: JSON.stringify(dados),
                headers: { 'Authorization': `Bearer ${TOKEN}`, 'x-cp-content-type': 'application/json' }
            });
            const d = await res.json();
            if(!BL_URL) { BL_URL = d.url; localStorage.setItem('url_ativa', BL_URL); }
            document.getElementById('status').innerText = "Sincronizado!";
            render();
        }

        function importarDados(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                dados = JSON.parse(ev.target.result);
                salvar();
            };
            reader.readAsText(e.target.files[0]);
        }

        function render() {
            const c = document.getElementById('corpoTabela');
            c.innerHTML = dados.transacoes.map((t, i) => `
                <div class="border-b pb-2 cursor-pointer" onclick="toggle(${i})">
                    <div class="flex justify-between font-bold">
                        <span>${t.subitens ? (t.aberto ? '▼ ' : '▶ ') : ''} ${t.desc}</span>
                        <span class="${t.valor < 0 ? 'text-red-500' : 'text-green-600'}">R$ ${Math.abs(t.valor).toLocaleString()}</span>
                    </div>
                    <div class="text-xs text-gray-400">${t.data} - ${t.categoria}</div>
                    ${t.aberto && t.subitens ? t.subitens.map(s => `
                        <div class="ml-6 text-sm italic text-gray-500 flex justify-between border-l pl-2 mt-1">
                            <span>${s.desc} (${s.categoria})</span>
                            <span>R$ ${s.valor}</span>
                        </div>
                    `).join('') : ''}
                </div>
            `).join('');
        }

        function toggle(i) { if(dados.transacoes[i].subitens) { dados.transacoes[i].aberto = !dados.transacoes[i].aberto; render(); } }
        
        function renderCat() {
            document.getElementById('listaCat').innerHTML = dados.categorias.map(cat => `
                <li class="py-2 flex justify-between">${cat} <button onclick="delCat('${cat}')" class="text-red-500">x</button></li>
            `).join('');
        }

        function addCat() { const v = document.getElementById('novaCat').value; if(v){ dados.categorias.push(v); salvar(); renderCat(); } }
        function delCat(cat) { dados.categorias = dados.categorias.filter(c => c !== cat); salvar(); renderCat(); }

        // Tentar carregar da nuvem ao abrir
        if(BL_URL) fetch(BL_URL).then(r => r.json()).then(d => { dados = d; render(); });
    </script>
</body>
</html>
