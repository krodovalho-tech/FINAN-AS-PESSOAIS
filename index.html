<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">
    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <header class="bg-blue-600 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Financeiro Sincronizado</h1>
                <p id="status" class="text-blue-200 text-xs italic font-bold">Nuvem: Conectando...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="aba('lancamentos')" class="bg-blue-700 px-3 py-1 rounded">Lançar</button>
                <button onclick="aba('categorias')" class="bg-blue-700 px-3 py-1 rounded">Categorias</button>
            </div>
        </header>

        <div id="conteudo-lancamentos" class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="p-4 bg-red-50 rounded-xl border border-red-100">
                    <span class="text-xs text-gray-400 font-bold uppercase">Unicred</span>
                    <p class="text-xl font-mono font-bold text-red-600">-R$ 8.038,12</p>
                </div>
                <div class="p-4 bg-orange-50 rounded-xl border border-orange-100">
                    <span class="text-xs text-gray-400 font-bold uppercase">Caixa</span>
                    <p class="text-xl font-mono font-bold text-red-600">-R$ 2.458,67</p>
                </div>
                <div class="p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <span class="text-xs text-gray-400 font-bold uppercase">Cartão (Mês)</span>
                    <p id="totalFaturas" class="text-xl font-mono font-bold text-blue-700">R$ 0,00</p>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>
        </div>

        <div id="conteudo-categorias" class="p-6 hidden">
            <h2 class="text-xl font-bold mb-4">Categorias</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="novaCat" class="border p-2 flex-1 rounded">
                <button onclick="addCategoria()" class="bg-blue-600 text-white px-4 rounded">Add</button>
            </div>
            <ul id="listaCat" class="space-y-2"></ul>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO IMPORTANTE
        const BLOB_TOKEN = "COLE_AQUI_SEU_TOKEN_DO_VERCEL_BLOB";
        const BLOB_URL = "https://financeiro.public.blob.vercel-storage.com/dados.json";

        let dados = { transacoes: [], categorias: ["Moradia", "Alimentação", "Veículo", "Encargos"] };

        // 1. BAIXAR DADOS DA NUVEM AO INICIAR
        async function carregarDaNuvem() {
            try {
                const response = await fetch(BLOB_URL);
                if (response.ok) {
                    dados = await response.json();
                    document.getElementById('status').innerText = "Nuvem: Sincronizado";
                    render();
                }
            } catch (e) {
                document.getElementById('status').innerText = "Nuvem: Erro ao baixar";
                console.error("Erro ao carregar", e);
            }
        }

        // 2. SALVAR NA NUVEM (UPLOAD)
        async function salvarNaNuvem() {
            document.getElementById('status').innerText = "Nuvem: Salvando...";
            try {
                await fetch(BLOB_URL, {
                    method: 'PUT',
                    body: JSON.stringify(dados),
                    headers: {
                        'Authorization': `Bearer ${BLOB_TOKEN}`,
                        'x-cp-content-type': 'application/json'
                    }
                });
                document.getElementById('status').innerText = "Nuvem: Salvo com sucesso!";
            } catch (e) {
                document.getElementById('status').innerText = "Nuvem: Erro ao salvar";
            }
        }

        function aba(nome) {
            document.getElementById('conteudo-lancamentos').classList.toggle('hidden', nome !== 'lancamentos');
            document.getElementById('conteudo-categorias').classList.toggle('hidden', nome !== 'categorias');
            if(nome === 'categorias') renderCategorias();
        }

        function render() {
            const corpo = document.getElementById('corpoTabela');
            let html = '';
            let total = 0;

            dados.transacoes.forEach((t, i) => {
                if(t.subitens) total += t.valor;
                html += `
                    <tr class="border-b" onclick="toggle(${i})">
                        <td class="py-3 text-sm">${t.data}</td>
                        <td class="py-3">
                            <span class="block font-medium">${t.desc}</span>
                            <span class="text-[10px] text-gray-400 uppercase">${t.categoria}</span>
                        </td>
                        <td class="py-3 text-right font-mono ${t.valor < 0 ? 'text-red-500' : 'text-green-600'}">
                            R$ ${Math.abs(t.valor).toLocaleString('pt-BR')}
                        </td>
                    </tr>
                `;
                if(t.aberto && t.subitens) {
                    t.subitens.forEach(s => {
                        html += `<tr class="bg-slate-50 italic text-xs text-gray-500"><td colspan="2" class="p-2 pl-6">${s.desc}</td><td class="text-right p-2">R$ ${s.valor}</td></tr>`;
                    });
                }
            });
            corpo.innerHTML = html;
            document.getElementById('totalFaturas').innerText = `R$ ${Math.abs(total).toLocaleString('pt-BR')}`;
        }

        function toggle(i) {
            if(dados.transacoes[i].subitens) {
                dados.transacoes[i].aberto = !dados.transacoes[i].aberto;
                render();
            }
        }

        // Chamar carga inicial
        carregarDaNuvem();
    </script>
</body>
</html>
