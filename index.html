<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Financeiro Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden min-h-[500px]">
        <header class="bg-blue-600 p-6 text-white flex justify-between items-center">
            <div><h1 class="text-xl font-bold">Meu Financeiro Cloud</h1><p id="status" class="text-blue-100 text-xs italic font-bold">Iniciando...</p></div>
            <button onclick="document.getElementById('importFile').click()" class="bg-green-500 px-4 py-2 rounded-lg font-bold text-sm">Importar JSON</button>
            <input type="file" id="importFile" class="hidden" onchange="importarDados(event)">
        </header>
        <main id="corpoTabela" class="p-6 space-y-3"></main>
    </div>

    <script>
        // Use o seu TOKEN atual ou o novo que você criar
        const TOKEN = "vercel_blob_rw_LSTMZDJfvY9YzSu8_yaCRUQbcCBJKGW4MMuLYCuKhUJ2knI";
        
        // URL UNIVERSAL (Não mude isso, a Vercel entende esse endereço)
        const targetUrl = "https://blob.vercel-storage.com/meus_dados.json";
        
        let dados = { transacoes: [] };

        async function salvar() {
            document.getElementById('status').innerText = "Sincronizando...";
            try {
                const res = await fetch(targetUrl, {
                    method: 'PUT',
                    body: JSON.stringify(dados),
                    headers: { 'Authorization': `Bearer ${TOKEN}`, 'x-api-version': '1', 'Content-Type': 'application/json' }
                });
                if (res.ok) { document.getElementById('status').innerText = "Sincronizado!"; render(); }
            } catch (err) { document.getElementById('status').innerText = "Erro ao Salvar"; }
        }

        function importarDados(e) {
            const reader = new FileReader();
            reader.onload = async (ev) => { 
                try {
                    dados = JSON.parse(ev.target.result); 
                    await salvar(); 
                } catch (e) { alert("Erro no arquivo!"); }
            };
            reader.readAsText(e.target.files[0]);
        }

        function render() {
            const c = document.getElementById('corpoTabela');
            if (!dados.transacoes || dados.transacoes.length === 0) {
                c.innerHTML = '<p class="text-center text-slate-400">Clique em Importar para começar.</p>';
                return;
            }
            c.innerHTML = dados.transacoes.map(t => `
                <div class="border p-4 rounded-xl flex justify-between items-center bg-slate-50">
                    <div><p class="font-bold">${t.desc}</p><p class="text-xs text-slate-400">${t.data}</p></div>
                    <div class="font-bold ${t.valor < 0 ? 'text-red-500' : 'text-green-600'}">R$ ${Math.abs(t.valor).toLocaleString('pt-BR')}</div>
                </div>
            `).join('');
        }

        window.onload = async () => {
            try {
                const r = await fetch(targetUrl, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
                if (r.ok) { dados = await r.json(); document.getElementById('status').innerText = "Conectado"; render(); }
                else { document.getElementById('status').innerText = "Pronto para importar"; render(); }
            } catch (e) { document.getElementById('status').innerText = "Aguardando Importação"; render(); }
        };
    </script>
</body>
</html>
